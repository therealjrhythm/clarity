<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clarity — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#11131b;
  --bg-2:#0e0f16;
  --surface:#15171f;
  --surface-2:#181a23;
  --elevated:#101118;
  --line:#23252f;
  --line-soft:#1c1e27;
  --text:#f6f2ea;
  --text-2:#9a9aa2;
  --text-3:#6b6b73;
  --accent:#d9a15e;
  --accent-soft:#2c2623;
  --font:"Schibsted Grotesk",system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --r-lg:18px;--r-md:12px;--r-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,textarea{font-family:inherit}
::selection{background:rgba(217,161,94,.28)}

.app{display:flex;height:100%;width:100%}

/* ---------- Icon buttons ---------- */
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;color:var(--text-2);transition:background .15s,color .15s}
.icon-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.icon-btn.ghost{color:var(--text-3)}
.icon-btn.ghost:hover{color:var(--text)}

/* ---------- Sidebar ---------- */
.sidebar{width:276px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-2);border-right:1px solid var(--line-soft);padding:14px 12px;transition:width .26s cubic-bezier(.4,0,.2,1)}
.sidebar.is-collapsed{width:72px}
.sb-top{display:flex;align-items:center;justify-content:space-between;height:40px;padding:0 4px;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:linear-gradient(150deg,var(--accent),#b9824a);color:#1a140c;font-weight:700;font-size:16px;flex-shrink:0;box-shadow:0 0 0 1px rgba(217,161,94,.25)}
.brand-mark.sm{width:24px;height:24px;font-size:13px;border-radius:7px}
.brand-name{font-weight:600;font-size:17px;letter-spacing:-.01em}
.is-collapsed .sb-top{justify-content:center}
.is-collapsed .brand{display:none}

.new-project{display:flex;align-items:center;gap:10px;width:100%;height:42px;padding:0 13px;border-radius:11px;background:var(--surface);border:1px solid var(--line);color:var(--text);font-size:14px;font-weight:500;transition:.15s}
.new-project:hover{background:var(--surface-2);border-color:#2e3140}
.is-collapsed .new-project{justify-content:center;padding:0}

.sb-search{display:flex;align-items:center;gap:9px;margin-top:8px;padding:0 12px;height:38px;border-radius:10px;color:var(--text-3)}
.sb-search:focus-within{background:var(--surface)}
.sb-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13.5px}
.sb-search input::placeholder{color:var(--text-3)}
.sb-rail-btn{margin:8px auto 0}

.sb-scroll{flex:1;overflow-y:auto;margin-top:14px;padding-right:2px}
.sb-scroll::-webkit-scrollbar{width:6px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.sb-group{margin-bottom:16px}
.sb-group-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);padding:0 12px 7px}

.proj-row{display:flex;align-items:center;gap:11px;width:100%;padding:8px 12px;border-radius:10px;text-align:left;transition:background .14s}
.proj-row:hover{background:var(--surface)}
.proj-ic{display:grid;place-items:center;width:26px;height:26px;border-radius:7px;color:var(--accent);background:var(--accent-soft);flex-shrink:0}
.is-collapsed .proj-row{justify-content:center;padding:8px 0}
.proj-text{display:flex;flex-direction:column;min-width:0;flex:1}
.proj-name{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{font-size:11.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 8px rgba(217,161,94,.6)}

.sb-user{display:flex;align-items:center;gap:10px;padding:9px 8px;margin-top:8px;border-top:1px solid var(--line-soft)}
.avatar{display:grid;place-items:center;width:32px;height:32px;border-radius:50%;background:var(--surface-2);color:var(--text);font-size:13px;font-weight:600;flex-shrink:0;border:1px solid var(--line)}
.is-collapsed .sb-user{justify-content:center}
.user-text{display:flex;flex-direction:column;flex:1;min-width:0}
.user-name{font-size:13px;font-weight:500}
.user-email{font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- Main ---------- */
.main{flex:1;position:relative;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.topbar{height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:3}
.tb-brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15px}

.ambient-glow{position:absolute;top:38%;left:50%;width:760px;height:520px;transform:translate(-50%,-50%);background:radial-gradient(ellipse at center,rgba(217,161,94,.14),rgba(217,161,94,.04) 42%,transparent 70%);filter:blur(8px);pointer-events:none;z-index:0}

.stage{flex:1;position:relative;z-index:2;display:flex;overflow-y:auto;padding:24px 32px 60px}
.stage--center,.stage--aura{align-items:center;justify-content:center}
.stage--editorial{align-items:center;justify-content:flex-start}
.stage--centered{align-items:center;justify-content:center}
.stage--page{align-items:flex-start;justify-content:center}
.stage-inner{width:100%;max-width:720px;display:flex;flex-direction:column}
.layout-editorial .stage-inner{max-width:780px;align-items:flex-start;padding-left:2vw}

/* ---------- Greeting ---------- */
.greeting{margin-bottom:26px;text-align:center}
.greeting h1{font-size:38px;font-weight:600;letter-spacing:-.025em;line-height:1.1}
.g-name{color:var(--accent)}
.greeting--editorial{text-align:left;margin-bottom:30px}
.greeting--editorial h1{font-size:52px;font-weight:700;line-height:1.04}
.greeting--aura h1{font-size:40px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.greeting-sub{margin-top:16px;color:var(--text-2);font-size:16px;max-width:480px;line-height:1.5}

/* ---------- Prompt box ---------- */
.prompt-box{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:8px 8px 8px 4px;width:100%;transition:border-color .18s,box-shadow .18s}
.prompt-box:focus-within{border-color:#34373f;box-shadow:0 0 0 4px rgba(217,161,94,.07),0 18px 50px -20px rgba(0,0,0,.6)}
.layout-aura .prompt-box,.layout-centered .prompt-box{box-shadow:0 24px 70px -28px rgba(217,161,94,.2),0 12px 40px -20px rgba(0,0,0,.7)}
.prompt-input{display:block;width:100%;background:none;border:none;outline:none;resize:none;color:var(--text);font-size:16.5px;line-height:1.5;padding:14px 16px 6px;max-height:220px}
.prompt-input::placeholder{color:var(--text-3)}
.prompt-actions{display:flex;align-items:center;justify-content:space-between;padding:2px 6px 2px 10px}
.pa-left,.pa-right{display:flex;align-items:center;gap:6px}

.send-btn{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:var(--surface-2);color:var(--text-3);transition:.18s}
.send-btn.is-ready{background:var(--accent);color:#1a140c;box-shadow:0 4px 16px -4px rgba(217,161,94,.5)}
.send-btn.is-ready:hover{filter:brightness(1.06);transform:translateY(-1px)}
.send-btn:disabled{cursor:default}

/* ---------- Model pill ---------- */
.model-pill-wrap{position:relative}
.model-pill{display:flex;align-items:center;gap:7px;height:34px;padding:0 11px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--text-2);font-size:13px;font-weight:500;white-space:nowrap;transition:.15s}
.model-pill svg:last-child{flex-shrink:0}
.model-pill:hover{border-color:#34373f;color:var(--text)}
.model-glyph{color:var(--accent);display:inline-flex}
.model-menu{position:absolute;bottom:calc(100% + 8px);left:0;width:212px;background:var(--elevated);border:1px solid var(--line);border-radius:13px;padding:6px;box-shadow:0 20px 50px -16px rgba(0,0,0,.7);z-index:20}
.model-menu-label{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-3);padding:7px 10px 5px}
.model-opt{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 10px;border-radius:9px;font-size:13.5px;color:var(--text-2);transition:.12s}
.model-opt:hover{background:var(--surface);color:var(--text)}
.model-opt.is-active{color:var(--text)}
.model-opt.is-active svg{color:var(--accent)}

/* ---------- Chips ---------- */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px;justify-content:center}
.layout-editorial .chips{justify-content:flex-start}
.chip{display:flex;align-items:center;gap:8px;height:38px;padding:0 15px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--text-2);font-size:13.5px;font-weight:500;white-space:nowrap;transition:.15s}
.chip svg{flex-shrink:0}
.chip:hover{border-color:#34373f;color:var(--text);background:var(--surface-2)}
.chip svg{color:var(--accent)}

/* ---------- Thinking ---------- */
.thinking{width:100%;display:flex;flex-direction:column;align-items:center;gap:30px;animation:fadeUp .4s ease}
.user-echo{max-width:560px;background:var(--surface);border:1px solid var(--line);border-radius:16px 16px 4px 16px;padding:14px 20px;font-size:16px;line-height:1.5;align-self:flex-end;color:var(--text)}
.pipeline{display:flex;gap:16px;align-self:flex-start;padding-left:6px}
.pulse-dot{width:11px;height:11px;border-radius:50%;background:var(--accent);margin-top:5px;animation:pulse 1.1s ease-in-out infinite;flex-shrink:0}
.pipe-lines{display:flex;flex-direction:column;gap:11px}
.pipe-line{display:flex;align-items:center;gap:10px;font-size:15.5px;color:var(--text-3);transition:color .3s;opacity:.55}
.pipe-line .pipe-bullet{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--text-3)}
.pipe-line.active{color:var(--text);opacity:1}
.pipe-line.done{color:var(--text-2);opacity:1}
.pipe-line.done svg{color:var(--accent)}
.pipe-line.active .pipe-bullet{border-color:var(--accent);box-shadow:0 0 0 4px rgba(217,161,94,.12)}

/* ---------- Next page ---------- */
.nextpage{width:100%;max-width:720px;animation:fadeUp .45s ease;padding-top:8px}
.back-link{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;color:var(--text-3);font-size:13px;margin-bottom:24px;transition:color .15s}
.back-link svg{transform:rotate(180deg)}
.back-link:hover{color:var(--text)}
.np-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.np-title{font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1.18;margin-bottom:14px;color:var(--text)}
.np-title .accent-word{color:var(--accent)}
.np-sub{color:var(--text-2);font-size:16px;line-height:1.55;max-width:560px;margin-bottom:30px}
.np-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.np-card{display:flex;align-items:flex-start;gap:14px;position:relative;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px}
.np-card.is-active{border-color:rgba(217,161,94,.4);background:linear-gradient(180deg,var(--surface),var(--accent-soft))}
.np-num{font-family:var(--mono);font-size:13px;color:var(--accent);padding-top:2px}
.np-step-t{font-size:15px;font-weight:600;margin-bottom:5px}
.np-step-d{font-size:13px;color:var(--text-2);line-height:1.45}
.np-badge{position:absolute;top:14px;right:14px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:rgba(217,161,94,.1);padding:4px 8px;border-radius:6px}
.np-preview{height:160px;border:1px dashed var(--line);border-radius:16px;display:grid;place-items:center;background:repeating-linear-gradient(135deg,transparent,transparent 11px,rgba(255,255,255,.018) 11px,rgba(255,255,255,.018) 22px)}
.np-preview-label{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.7);opacity:.5}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}

@media (max-width:760px){
  .sidebar{position:absolute;z-index:30;height:100%}
  .greeting--editorial h1{font-size:38px}
  .greeting h1{font-size:30px}
  .np-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="clarity-components.jsx"></script>

</body>
</html>
